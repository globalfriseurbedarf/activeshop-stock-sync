name: ActiveShop Shopify Stock Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: stock-sync
  cancel-in-progress: false

jobs:
  sync-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Dosyalari al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python paketlerini kur
        run: pip install -r requirements.txt

      - name: ActiveShop stoklarini Shopify ile senkronize et
        env:
          FEED_URL: "https://b2b.activeshop.com.pl/media/productsfeed/b2b-de.csv"

          SHOPIFY_SHOP: "bzjwyw-jv.myshopify.com"
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_API_VERSION: "2026-04"

          FEED_SKU_COLUMN: "sku"
          FEED_STOCK_COLUMN: "qty"

          # Artik stoklar bu lokasyona yazilacak: Lager in Wroclaw
          SHOPIFY_LOCATION_ID: "119279812950"

          # Yanlis depoda kalan stoklari 0 yapar.
          ZERO_OTHER_LOCATIONS: "true"

          # Ilk test icin true yapabilirsin. Gercek guncelleme icin false olmali.
          DRY_RUN: "false"

          # Feedde olmayan Shopify urunleri 0 yapilmasin.
          SET_MISSING_SKU_TO_ZERO: "false"

        run: python stock_sync.py

      - name: Raporu yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-sync-report
          path: stock_sync_report.csv
